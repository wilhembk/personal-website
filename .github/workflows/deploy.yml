name: Deploy
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH Key setup Configuration
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: SSH Configuration Setup
        run: |
          mkdir -p ~/.ssh
          cat << EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.PROXY_HOST }}
            User ${{ secrets.PROXY_USER }}
            StrictHostKeyChecking accept-new

          Host destination
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            ProxyJump bastion
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config
      
      
      - name: Sync on production
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            ./ destination:~/www/
